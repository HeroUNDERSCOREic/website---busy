<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        body {
            background-color: #222034;
            color: white;
            font-family: verdana;
            text-align: center;
            margin: 0;
            height: 100vh;
            display: grid;
            place-items: center;
        }
    </style>
</head>
<body>
    <div>
        <h1 id="statusText">loading...</h1>
        <img id="statusImage" src="" alt="status image" width="640" height="360">
        <div id="schedule"></div>
    </div>

    <script type="module">
        const page1 = "https://docs.google.com/spreadsheets/d/1r1UJMhMoP81Kiyoteyr2gfyST2B3RLvUHF3jYbaScOg/export?format=csv&gid=0";
        const page2 = "https://docs.google.com/spreadsheets/d/1r1UJMhMoP81Kiyoteyr2gfyST2B3RLvUHF3jYbaScOg/export?format=csv&gid=105834990";

        const variables = await fetch(page1);
        const variableText = await variables.text();

        const variableRows = variableText.trim().split("\n");
        const values = variableRows[1].split(",");

        let busy = values[0].trim().toLowerCase();
        let booked = values[1].trim().toLowerCase();

        if (busy == "yes") {
            document.getElementById("statusText").textContent = "hero doesn't feel like accepting any bookings right now sorry...";
            document.getElementById("statusText").style.color = "#ff4b4b";
            document.getElementById("statusImage").src = "https://somehero.s-ul.eu/RAQauAwm";
        }
        else if (busy == "no" && booked == "no") {
            document.getElementById("statusText").textContent = "hero is free, but she doesn't wanna be booked.. y-you can try shooting your shot though!";
            document.getElementById("statusText").style.color = "#ffd166";
            document.getElementById("statusImage").src = "https://somehero.s-ul.eu/K8IB2W0t";
        }
        else if (busy == "no" && booked == "yes") {
            document.getElementById("statusText").textContent = "hero is free... shoot a dm and see what she says!";
            document.getElementById("statusText").style.color = "#7CFC98";
            document.getElementById("statusImage").src = "https://somehero.s-ul.eu/ir6ULaig";
        }

        const list = await fetch(page2);
        const text = await list.text();

        const rows = text.trim().split("\n").slice(1);

        let html = "<table style='margin:auto; text-align:center;'>";

        rows.forEach(row => {
            const parts = row.split(",");
            const date = parts[0];
            const reason = parts[1];

            html += `
                <tr>
                    <td style="text-align:right; width:140px;">${date}</td>
                    <td style="padding:0 12px;">-</td>
                    <td style="text-align:left; font-weight:bold;">${reason}</td>
                </tr>
            `;
        });

        html += "</table>";

        document.getElementById("schedule").innerHTML = html;
    </script>
</body>
</html>
